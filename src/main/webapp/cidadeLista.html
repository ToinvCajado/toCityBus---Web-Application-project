<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Lista de Cidades - BusTicket</title>
    </h:head>
    <h:body>
        <h1>Gerenciamento de Cidades</h1>
        
        <h:form id="formCadastro">
            <h3>Cadastrar Nova Cidade</h3>
            <h:panelGrid columns="2">
                <h:outputLabel value="Nome da Cidade:" for="nome" />
                <h:inputText id="nome" value="#{cidadeBean.cidade.nome}" />
                
                <h:outputLabel value="UF:" for="uf" />
                <h:inputText id="uf" value="#{cidadeBean.cidade.uf}" maxlength="2" />
                
                <h:commandButton value="Salvar" action="#{cidadeBean.salvar}" />
            </h:panelGrid>
        </h:form>

        <hr />

        <h3>Cidades Cadastradas</h3>
        <h:form id="formTabela">
            <h:dataTable value="#{cidadeBean.listaCidades}" var="c" border="1">
                <h:column>
                    <f:facet name="header">ID</f:facet>
                    <h:outputText value="#{c.id}" />
                </h:column>
                
                <h:column>
                    <f:facet name="header">Nome</f:facet>
                    <h:outputText value="#{c.nome}" />
                </h:column>
                
                <h:column>
                    <f:facet name="header">UF</f:facet>
                    <h:outputText value="#{c.uf}" />
                </h:column>
                
                <h:column>
                    <f:facet name="header">Ações</f:facet>
                    <h:commandLink value="Editar" action="#{cidadeBean.prepararEditar(c)}" />
                    | 
                    <h:commandLink value="Excluir" action="#{cidadeBean.excluir(c)}" 
                                   onclick="return confirm('Tem certeza?')" />
                </h:column>
            </h:dataTable>
        </h:form>
        
        <br />
        <h:link value="Voltar para o Painel" outcome="painel" />
    </h:body>
</html>
