<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:pt="jakarta.faces.passthrough"> <h:head>
        <title>Login - Sistema de Passagens Rodoviárias</title>
        <h:outputStylesheet library="css" name="style.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <h:body>
    <h1>Gerenciar Transportes (Ônibus)</h1>
    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel value="Placa:" />
            <h:inputText value="#{transporteBean.veiculo.placa}" />
            <h:outputLabel value="Modelo:" />
            <h:inputText value="#{transporteBean.veiculo.modelo}" />
            <h:outputLabel value="Capacidade:" />
            <h:inputText value="#{transporteBean.veiculo.capacidade}" />
            <h:commandButton value="Salvar Veículo" action="#{transporteBean.salvar}" />
        </h:panelGrid>
    </h:form>
    <br/>
    <h:dataTable value="#{transporteBean.lista}" var="v" border="1">
        <h:column><f:facet name="header">Placa</f:facet>#{v.placa}</h:column>
        <h:column><f:facet name="header">Modelo</f:facet>#{v.modelo}</h:column>
        <h:column><f:facet name="header">Capacidade</f:facet>#{v.capacidade}</h:column>
        <h:column><h:commandLink value="Editar" /></h:column>
    </h:dataTable>
</h:body>
</html>
