<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <meta charset="UTF-8"/>
    <title>Login - ToCityBus</title>
    <h:outputStylesheet library="resources" name="style.css"/>
</h:head>
<h:body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-titulo">
            <p style="font-size:36px">🚌</p>
            <h1>ToCityBus</h1>
            <p>Faça login para continuar</p>
        </div>

        <p:messages showDetail="false" closable="false"/>

        <h:form>
            <div class="form-group">
                <label class="form-label">Login</label>
                <p:inputText value="#{loginBean.login}"
                             styleClass="form-control"
                             placeholder="Seu login"
                             required="true"
                             requiredMessage="Login obrigatório"/>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <p:password value="#{loginBean.senha}"
                            styleClass="form-control"
                            placeholder="Sua senha"
                            feedback="false"
                            required="true"
                            requiredMessage="Senha obrigatória"/>
            </div>
            <p:commandButton value="Entrar"
                             action="#{loginBean.autenticar}"
                             styleClass="btn btn-primary"
                             style="width:100%;padding:10px"
                             update="@form"/>
        </h:form>
    </div>
</div>
</h:body>
</html>
