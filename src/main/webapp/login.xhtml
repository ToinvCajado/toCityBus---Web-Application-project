<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:pt="jakarta.faces.passthrough"> <h:head>
        <title>Login - Sistema de Passagens Rodoviárias</title>
        <h:outputStylesheet library="css" name="style.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    </h:head>
    
    <h:body>
        <div class="container">
            <aside class="sidebar">
                <h2>Sistema de Passagens Rodoviárias</h2>
                <nav>
                    <p class="menu-label">MENU</p>
                    <ul>
                        <li><a href="#">Faça login para acessar</a></li>
                    </ul>
                </nav>
            </aside>

            <main class="login-area">
                <div class="login-header">
                    <div class="icon-box">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h1>Bem-vindo</h1>
                    <p>Informe suas credenciais para continuar</p>
                </div>

                <div class="login-card">
                    <h:form id="formLogin">
                        <div class="input-group">
                            <h:outputLabel for="login" value="Login" />
                            <h:inputText id="login" value="#{loginBean.usuario}" 
                                         pt:placeholder="admin" styleClass="input-field" />
                        </div>
                        
                        <div class="input-group">
                            <h:outputLabel for="senha" value="Senha" />
                            <h:inputSecret id="senha" value="#{loginBean.senha}" 
                                           pt:placeholder="********" styleClass="input-field" />
                        </div>
                        
                        <h:commandButton value="Entrar" action="#{loginBean.entrar}" styleClass="btn-entrar" />
                    </h:form>
                </div>
            </main>
        </div>
    </h:body>
</html>
