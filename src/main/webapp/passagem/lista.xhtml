<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">
<ui:composition template="/template/layout.xhtml">

    <ui:define name="titulo">Passagens - ToCityBus</ui:define>

    <ui:define name="conteudo">
        <p:messages showDetail="false"/>
        <h:form>
            <div class="page-header">
                <h1 class="page-title">Passagens Vendidas</h1>
                <h:link outcome="/passagem/formulario"
                        styleClass="btn btn-primary">
                    + Vender Passagem
                </h:link>
            </div>

            <div class="card">
                <p:dataTable value="#{passagemBean.passagens}"
                             var="p"
                             emptyMessage="Nenhuma passagem vendida.">
                    <p:column headerText="#">
                        <h:outputText value="#{p.idPassagem}"/>
                    </p:column>
                    <p:column headerText="Veículo">
                        <h:outputText value="#{p.veiculo.placa}"/>
                    </p:column>
                    <p:column headerText="Poltrona">
                        <h:outputText value="#{p.poltrona}"/>
                    </p:column>
                    <p:column headerText="Roteiro">
                        <h:outputText
                            value="#{p.cidadeOrigem.nomeCidade} → #{p.cidadeDestino.nomeCidade}"/>
                    </p:column>
                    <p:column headerText="Data">
                        <h:outputText value="#{p.dataSaida}">
                            <f:convertDateTime pattern="dd/MM/yyyy"
                                              type="localDate"/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Hora">
                        <h:outputText value="#{p.horaSaida}"/>
                    </p:column>
                    <p:column headerText="Valor">
                        <h:outputText value="#{p.valorPassagem}">
                            <f:convertNumber type="currency"
                                            currencySymbol="R$ "
                                            minFractionDigits="2"/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Ações">
                        <p:commandButton value="Excluir"
                            styleClass="btn btn-perigo btn-sm"
                            action="#{passagemBean.excluir(p)}"
                            update="@form"
                            onclick="return confirm('Excluir esta passagem?')"/>
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>
    </ui:define>
</ui:composition>
</html>
