<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">
<ui:composition template="/template/layout.xhtml">

    <ui:define name="titulo">Faturamento - ToCityBus</ui:define>

    <ui:define name="conteudo">
        <div class="page-header">
            <h1 class="page-title">Relatório de Faturamento</h1>
        </div>
        <p:messages showDetail="true"/>

        <h:form>
            <div class="card" style="margin-bottom:18px">
                <div class="card-body">
                    <div class="form-linha">
                        <div class="form-group">
                            <label class="form-label">Início *</label>
                            <p:datePicker
                                value="#{passagemBean.inicioFaturamento}"
                                styleClass="form-control"
                                pattern="dd/MM/yyyy"
                                required="true"
                                requiredMessage="Data início obrigatória"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fim *</label>
                            <p:datePicker
                                value="#{passagemBean.fimFaturamento}"
                                styleClass="form-control"
                                pattern="dd/MM/yyyy"
                                required="true"
                                requiredMessage="Data fim obrigatória"/>
                        </div>
                    </div>
                    <div class="form-acoes"
                         style="border:none;padding:0;margin-top:8px">
                        <p:commandButton value="Gerar Relatório"
                            styleClass="btn btn-primary"
                            action="#{passagemBean.calcularFaturamento}"
                            update="@form"/>
                    </div>
                </div>
            </div>

            <div class="card-faturamento"
                 rendered="#{passagemBean.totalFaturamento != null}">
                <div>
                    <div class="rotulo">Total Faturado no Período</div>
                </div>
                <div class="valor">
                    <h:outputText value="#{passagemBean.totalFaturamento}">
                        <f:convertNumber type="currency"
                                        currencySymbol="R$ "
                                        minFractionDigits="2"/>
                    </h:outputText>
                </div>
            </div>

            <p:dataTable
                value="#{passagemBean.passagensFaturamento}"
                var="p"
                rendered="#{passagemBean.passagensFaturamento != null}"
                emptyMessage="Nenhuma passagem no período.">
                <p:column headerText="#">
                    <h:outputText value="#{p.idPassagem}"/>
                </p:column>
                <p:column headerText="Data">
                    <h:outputText value="#{p.dataSaida}">
                        <f:convertDateTime pattern="dd/MM/yyyy"
                                          type="localDate"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="Roteiro">
                    <h:outputText
                        value="#{p.cidadeOrigem.nomeCidade} → #{p.cidadeDestino.nomeCidade}"/>
                </p:column>
                <p:column headerText="Veículo">
                    <h:outputText value="#{p.veiculo.placa}"/>
                </p:column>
                <p:column headerText="Poltrona">
                    <h:outputText value="#{p.poltrona}"/>
                </p:column>
                <p:column headerText="Valor">
                    <h:outputText value="#{p.valorPassagem}">
                        <f:convertNumber type="currency"
                                        currencySymbol="R$ "
                                        minFractionDigits="2"/>
                    </h:outputText>
                </p:column>
            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
</html>
