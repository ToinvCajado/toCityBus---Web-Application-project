<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:pt="jakarta.faces.passthrough">
    <h:head>
        <title>Consultar Roteiros - BusTicket</title>
    </h:head>
    <h:body>
        <h1>Consultar Passagens</h1>
        
        <h:form id="formBusca">
            <h:panelGrid columns="2">
                <h:outputLabel value="Origem:" />
                <h:selectOneMenu value="#{buscaBean.origemId}">
                    <f:selectItem itemLabel="Selecione a Origem" itemValue="" />
                    <f:selectItems value="#{cidadeBean.listaCidades}" var="c" 
                                   itemLabel="#{c.nome}" itemValue="#{c.id}" />
                </h:selectOneMenu>

                <h:outputLabel value="Destino:" />
                <h:selectOneMenu value="#{buscaBean.destinoId}">
                    <f:selectItem itemLabel="Selecione o Destino" itemValue="" />
                    <f:selectItems value="#{cidadeBean.listaCidades}" var="c" 
                                   itemLabel="#{c.nome}" itemValue="#{c.id}" />
                </h:selectOneMenu>

                <h:outputLabel value="Data da Viagem:" />
                <h:inputText pt:type="date" value="#{buscaBean.dataBusca}" />

                <h:commandButton value="Pesquisar Roteiros" action="#{buscaBean.pesquisar}" />
            </h:panelGrid>
        </h:form>

        <hr />

        <h3>Resultados Disponíveis</h3>
        <h:form id="resultado">
            <h:dataTable value="#{buscaBean.viagensEncontradas}" var="v" border="1">
                <h:column>
                    <f:facet name="header">Horário</f:facet>
                    <h:outputText value="#{v.horarioSaida}" />
                </h:column>
                <h:column>
                    <f:facet name="header">Veículo</f:facet>
                    <h:outputText value="#{v.veiculo.modelo} (#{v.veiculo.placa})" />
                </h:column>
                <h:column>
                    <f:facet name="header">Preço</f:facet>
                    <h:outputText value="#{v.valor}">
                        <f:convertNumber type="currency" currencySymbol="R$" />
                    </h:outputText>
                </h:column>
                <h:column>
                    <h:commandButton value="Selecionar" action="#{vendaBean.prepararVenda(v)}" />
                </h:column>
            </h:dataTable>
        </h:form>
    </h:body>
</html>
